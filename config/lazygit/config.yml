gui:
  expandFocusedSidePanel: true
  showFileTree: false
  showRandomTip: false
  showCommandLog: false
  showPanelJumps: false
  showBottomLine: true
  statusPanelView: allBranchesLog
  theme:
    selectedLineBgColor:
      - black
    activeBorderColor:
      - yellow
    inactiveBorderColor:
      - '#ccc'

os:
  edit: 'e {{filename}}'
  editAtLine: 'e +{{line}} {{filename}}'

promptToReturnFromSubprocess: false
disableStartupPopups: false
